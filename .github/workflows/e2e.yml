name: E2E

# Separate from the fast CI gate (ci.yml) so the browserless gate stays quick.
# This job boots its own api + web (Playwright `webServer`) and walks the demo flow.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    name: web e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @cel/web test:e2e:install

      - name: Build web
        run: pnpm --filter @cel/web build

      - name: Run E2E
        run: pnpm --filter @cel/web test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
