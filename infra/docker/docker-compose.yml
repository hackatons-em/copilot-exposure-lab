# Local full-stack: postgres + migrate (one-shot) + api + worker + web.
# Run from repo root:  docker compose -f infra/docker/docker-compose.yml up --build
name: copilot-exposure-lab

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cel
      POSTGRES_PASSWORD: cel
      POSTGRES_DB: cel
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cel -d cel"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.node
    working_dir: /app/packages/db
    command: pnpm db:migrate
    environment:
      DATABASE_URL: postgres://cel:cel@postgres:5432/cel
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.node
    working_dir: /app/apps/api
    command: pnpm start
    environment:
      DATABASE_URL: postgres://cel:cel@postgres:5432/cel
      PORT: "4000"
    ports:
      - "4000:4000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.node
    working_dir: /app/apps/worker
    command: pnpm start
    environment:
      DATABASE_URL: postgres://cel:cel@postgres:5432/cel
      WORKER_POLL_MS: "2000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_WORKSPACE_ID: ws-demo
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
